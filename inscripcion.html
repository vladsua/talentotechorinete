<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción | Talento Tech Oriente</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <a href="index.html" class="logo" style="text-decoration: none;">Talento Tech</a>
        <nav>
            <a href="index.html">Volver al Inicio</a>
        </nav>
    </header>

    <main>
        <section class="section">
            <div class="form-grid">
                <h2 style="text-align: center; margin-bottom: 2rem;">Formulario de Inscripción</h2>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Nombre Completo</label>
                        <input type="text" id="name" name="name" placeholder="Tu nombre artístico o legal" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="bootcamp">Bootcamp de Interés</label>
                        <select id="bootcamp" name="bootcamp" required>
                            <option value="" disabled selected>Selecciona un programa</option>
                            <option value="prog">Programación Fullstack</option>
                            <option value="ia">Inteligencia Artificial</option>
                            <option value="data">Análisis de Datos</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="motivation">¿Por qué quieres unirte?</label>
                        <textarea id="motivation" name="motivation" placeholder="Cuéntanos brevemente tus metas"
                            rows="4"
                            style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: white; padding: 1rem;"></textarea>
                    </div>

                    <button type="submit" class="btn submit-btn">Enviar Solicitud</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Talento Tech Oriente. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
